[project]
name = "contexthub-interchange"
version = "0.0.1"
description = "ContextHub interchange format spec (ch.v0.1): schemas, Pydantic models, markdown renderer, validator CLI."
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.8",
    "jsonschema>=4.23",
    "typer>=0.12",
]

[project.scripts]
ch-validate = "contexthub_interchange.cli:validate_app"
ch-golden = "contexthub_interchange.cli:golden_app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["contexthub_interchange"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
